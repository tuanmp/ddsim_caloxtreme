# Particle Gun Configuration - Single Electrons with Log-Uniform Energy
campaign: "single_particle_pilot"
dataset: "single_electron_loguniform"
version: "v1"
stage: "particlegun_generation"
detector: /global/cfs/cdirs/m3443/usr/pmtuan/ddsim_caloxtreme/detector/OpenDataDetector_noB_noTrack.xml

job_config:
  n_runs: 1
  runs_per_node: 1
  time_limit: "00:30:00"
  qos: "debug"
  execution_mode: "multi_node_slurm"

events: 100
seed: 42

gun_particle: "e-"
# energy_min: 10
# energy_max: 100
gun_energy: 10
log_uniform: true

gun_distribution: "eta"
gun_eta_min: -0.05
gun_eta_max: 0.05
gun_phi_min: 0.0
gun_phi_max: 6.28318530718

# Splitting configuration for monolithic/interactive mode
# Generates N separate run directories (0/, 1/, 2/, ...) each with 'events' events
# Each run gets seed = seed + run_id
splitting_config:
  enable: true
  n_runs: 1  # Number of run directories to generate
